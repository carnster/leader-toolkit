    <div id="splash" role="status" aria-label="IMPACT Implementation Companion is loading">
      <style>
        #splash {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: radial-gradient(ellipse at 50% 38%, #16315f 0%, #0c2454 55%, #081a3d 100%);
          transition: opacity 0.55s ease;
        }
        #splash.splash-hide { opacity: 0; pointer-events: none; }
        .splash-mark {
          padding: 22px 28px;
          border-radius: 20px;
          background: #fbfaf8;
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
          opacity: 0;
          animation: splash-rise 0.7s ease-out 0.1s forwards;
        }
        .splash-mark img { width: 220px; height: auto; display: block; }
        .splash-underline {
          width: 0;
          height: 4px;
          border-radius: 2px;
          background: #a80000;
          margin-top: 18px;
          animation: splash-draw 0.6s ease-out 0.7s forwards;
        }
        .splash-sub {
          margin-top: 6px;
          font-family: "Source Sans 3", ui-sans-serif, system-ui, sans-serif;
          font-size: 14px;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: rgba(251, 250, 248, 0.75);
          opacity: 0;
          animation: splash-fade 0.7s ease-out 0.85s forwards;
        }
        .splash-tagline {
          position: absolute;
          bottom: 56px;
          font-family: "Source Serif 4", Georgia, serif;
          font-style: italic;
          font-size: 16px;
          color: rgba(251, 250, 248, 0.85);
          opacity: 0;
          animation: splash-fade 0.8s ease-out 1.25s forwards;
        }
        @keyframes splash-rise {
          from { opacity: 0; transform: translateY(14px) scale(0.96); }
          to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes splash-draw { from { width: 0; } to { width: 180px; } }
        @keyframes splash-fade { from { opacity: 0; } to { opacity: 1; } }
        @media (prefers-reduced-motion: reduce) {
          .splash-mark, .splash-sub, .splash-tagline { animation-duration: 0.01s; animation-delay: 0s; }
          .splash-underline { animation-duration: 0.01s; animation-delay: 0s; }
        }
      </style>
