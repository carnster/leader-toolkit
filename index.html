<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMPACT Implementation Companion</title>
    <meta name="description" content="AI-guided workspace for school leaders to implement initiatives with fidelity and impact" />
    <meta name="author" content="IMPACT Implementation Companion" />

    <meta property="og:title" content="IMPACT Implementation Companion" />
    <meta property="og:description" content="Guide school improvement initiatives from decision to sustainable impact" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="alternate icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="splash" role="status" aria-label="IMPACT Implementation Companion is loading">
      <style>
        #splash {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: radial-gradient(ellipse at 50% 38%, #16315f 0%, #0c2454 55%, #081a3d 100%);
          transition: opacity 0.55s ease;
        }
        #splash.splash-hide { opacity: 0; pointer-events: none; }
        .splash-mark {
          width: 92px;
          height: 92px;
          border-radius: 20px;
          background: #fbfaf8;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: "Source Serif 4", Georgia, serif;
          font-size: 58px;
          font-weight: 700;
          color: #0c2454;
          box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
          opacity: 0;
          animation: splash-rise 0.7s ease-out 0.1s forwards;
        }
        .splash-underline {
          width: 0;
          height: 4px;
          border-radius: 2px;
          background: #a80000;
          margin-top: 18px;
          animation: splash-draw 0.6s ease-out 0.7s forwards;
        }
        .splash-word {
          margin-top: 22px;
          font-family: "Source Serif 4", Georgia, serif;
          font-size: 30px;
          font-weight: 700;
          letter-spacing: 0.04em;
          color: #fbfaf8;
          opacity: 0;
          animation: splash-fade 0.7s ease-out 0.9s forwards;
        }
        .splash-sub {
          margin-top: 6px;
          font-family: "Source Sans 3", ui-sans-serif, system-ui, sans-serif;
          font-size: 14px;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: rgba(251, 250, 248, 0.75);
          opacity: 0;
          animation: splash-fade 0.7s ease-out 1.05s forwards;
        }
        .splash-tagline {
          position: absolute;
          bottom: 56px;
          font-family: "Source Serif 4", Georgia, serif;
          font-style: italic;
          font-size: 16px;
          color: rgba(251, 250, 248, 0.85);
          opacity: 0;
          animation: splash-fade 0.8s ease-out 1.25s forwards;
        }
        @keyframes splash-rise {
          from { opacity: 0; transform: translateY(14px) scale(0.96); }
          to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes splash-draw { from { width: 0; } to { width: 92px; } }
        @keyframes splash-fade { from { opacity: 0; } to { opacity: 1; } }
        @media (prefers-reduced-motion: reduce) {
          .splash-mark, .splash-word, .splash-sub, .splash-tagline { animation-duration: 0.01s; animation-delay: 0s; }
          .splash-underline { animation-duration: 0.01s; animation-delay: 0s; }
        }
      </style>
      <div class="splash-mark">I</div>
      <div class="splash-underline"></div>
      <div class="splash-word">IMPACT</div>
      <div class="splash-sub">Implementation Companion</div>
      <div class="splash-tagline">Move from knowing to doing.</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
